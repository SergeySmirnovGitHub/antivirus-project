# Автоматическая сборка vtscan.exe на Windows-сервере GitHub.
# Срабатывает: при пуше в ветку main, при пуше тега вида v1.0, и по кнопке вручную.
name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:        # правки документации не запускают пересборку
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write        # нужно, чтобы при пуше тега создать Release с .exe

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Забрать код
        uses: actions/checkout@v4

      - name: Поставить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ВАЖНО: имена exe должны отличаться НЕ только регистром — ФС Windows
      # регистронезависима, иначе один файл затрёт другой.
      - name: Собрать CLI .exe (vtscan-cli.exe)
        run: pyinstaller --onefile --name vtscan-cli apps/vtscan/vtscan.py

      - name: Собрать GUI .exe (VTScan.exe, окно-приложение)
        run: pyinstaller --noconsole --onefile --name VTScan apps/vtscan/gui.py

      - name: Установить Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Собрать установщик VTScan-Setup.exe
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\VTScan.iss

      - name: Сложить все файлы в одну плоскую папку
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-files | Out-Null
          Copy-Item dist\vtscan-cli.exe release-files\
          Copy-Item dist\VTScan.exe release-files\
          Copy-Item installer\Output\VTScan-Setup.exe release-files\

      - name: Выложить артефакты (exe + установщик)
        uses: actions/upload-artifact@v4
        with:
          name: vtscan-windows
          if-no-files-found: error
          path: release-files/*

      - name: Прикрепить к релизу (только когда пушится тег vX.X)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
